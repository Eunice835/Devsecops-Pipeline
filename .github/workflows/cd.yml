name: CD

on:
  workflow_dispatch:
    inputs:
      apply_terraform:
        description: "Apply Terraform (true/false)"
        required: true
        default: "false"
  push:
    branches: [main]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/devsecops-vuln-app:latest
            ghcr.io/${{ github.repository_owner }}/devsecops-vuln-app:${{ github.sha }}

  terraform-plan-apply:
    runs-on: ubuntu-latest
    needs: build-and-push
    if: ${{ github.event_name == 'workflow_dispatch' }}
    defaults:
      run:
        working-directory: infra
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform init
        run: terraform init

      - name: Terraform validate
        run: terraform validate

      - name: Terraform plan
        run: terraform plan -var "container_image=ghcr.io/${{ github.repository_owner }}/devsecops-vuln-app:${{ github.sha }}"

      - name: Terraform apply (optional)
        if: ${{ github.event.inputs.apply_terraform == 'true' }}
        run: terraform apply -auto-approve -var "container_image=ghcr.io/${{ github.repository_owner }}/devsecops-vuln-app:${{ github.sha }}"
