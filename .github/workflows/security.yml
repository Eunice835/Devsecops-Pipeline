name: DevSecOps Security Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  security:
    runs-on: ubuntu-latest
    steps:
      - name: Stage 1 - Checkout code
        uses: actions/checkout@v4

      - name: Stage 2 - Install dependencies
        run: |
          echo "Installing Semgrep + Checkov and jq..."
          python -m pip install --upgrade pip
          pip install semgrep checkov
          sudo apt-get update
          sudo apt-get install -y jq

      - name: Stage 3 - Run Semgrep (fail on high/error findings)
        run: |
          echo "Running Semgrep SAST scan..."
          semgrep scan --config auto --json --output semgrep-report.json app || true
          HIGH_COUNT=$(jq '[.results[]? | select(.extra.severity == "ERROR")] | length' semgrep-report.json)
          echo "Semgrep high/error findings: ${HIGH_COUNT}"
          if [ "$HIGH_COUNT" -gt 0 ]; then
            echo "Failing pipeline: HIGH/ERROR Semgrep findings detected."
            exit 1
          fi

      - name: Stage 4 - Run Checkov on /infra (fail on critical issues)
        run: |
          echo "Running Checkov IaC scan..."
          checkov -d infra --framework terraform -o json > checkov-report.json || true
          CRITICAL_COUNT=$(jq '[.[].results.failed_checks[]? | select((.severity // "") == "CRITICAL")] | length' checkov-report.json)
          echo "Checkov critical findings: ${CRITICAL_COUNT}"
          if [ "$CRITICAL_COUNT" -gt 0 ]; then
            echo "Failing pipeline: CRITICAL Checkov findings detected."
            exit 1
          fi

      - name: Stage 5 - Build Docker image
        run: |
          echo "Building Docker image..."
          docker build -t devsecops-vuln-app:latest .

      - name: Stage 6 - Run Trivy scan (fail on HIGH/CRITICAL)
        run: |
          echo "Running Trivy image scan..."
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v ${{ github.workspace }}:/workdir \
            aquasec/trivy:latest image \
            --severity HIGH,CRITICAL \
            --ignore-unfixed \
            --exit-code 1 \
            --format json \
            --output /workdir/trivy-report.json \
            devsecops-vuln-app:latest

      - name: Stage 7 - Run OWASP ZAP baseline scan
        run: |
          echo "Starting app container..."
          docker network create zap-net
          docker run -d --name vulnerable-app --network zap-net -e LAB_MODE=true devsecops-vuln-app:latest
          sleep 10
          echo "Running ZAP baseline..."
          docker run --rm --network zap-net \
            -v ${{ github.workspace }}:/zap/wrk:rw \
            ghcr.io/zaproxy/zaproxy:stable \
            zap-baseline.py \
            -t http://vulnerable-app:3000 \
            -J zap-report.json \
            -r zap-report.html \
            -m 5 || true
          HIGH_RISK_COUNT=$(jq '[.site[].alerts[]? | select((.riskcode|tonumber) >= 3)] | length' zap-report.json)
          echo "ZAP high/critical findings: ${HIGH_RISK_COUNT}"
          if [ "$HIGH_RISK_COUNT" -gt 0 ]; then
            echo "Failing pipeline: HIGH/CRITICAL ZAP findings detected."
            exit 1
          fi

      - name: Stage 8 - Print final security summary
        if: always()
        run: |
          echo "========== SECURITY SUMMARY =========="
          echo "Semgrep report: semgrep-report.json"
          echo "Checkov report: checkov-report.json"
          echo "Trivy report: trivy-report.json"
          echo "ZAP reports: zap-report.json, zap-report.html"
          echo "======================================"

      - name: Upload security artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-scan-artifacts
          path: |
            semgrep-report.json
            checkov-report.json
            trivy-report.json
            zap-report.json
            zap-report.html
